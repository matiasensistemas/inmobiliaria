<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BA INMOSUR | Directorio Inmobiliario</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

.directory-row:hover{
background:#f8fafc;
}

</style>

</head>


<body class="bg-slate-50 text-slate-900 font-sans">

<header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">

<div class="container mx-auto px-4 py-6">

<div class="flex flex-col md:flex-row items-center justify-between gap-6">

<div>

<h1 class="text-2xl font-black tracking-tight">
BA INMO<span class="text-blue-700">SUR</span>
</h1>

<p class="text-slate-500 text-sm">
Directorio inmobiliario del Sur de CABA
</p>

</div>

<input
id="buscador"
placeholder="Buscar inmobiliaria o barrio..."
class="border border-slate-300 px-4 py-2 rounded-xl w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-blue-600">

</div>

</div>

</header>



<main class="container mx-auto px-4 py-8">

<div class="mb-4">

<span id="counter"
class="text-xs uppercase font-bold text-slate-400">

Cargando base de datos...

</span>

</div>



<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">

<div class="hidden md:grid grid-cols-12 p-4 bg-slate-50 text-xs font-bold uppercase text-slate-400">

<div class="col-span-3">Inmobiliaria</div>

<div class="col-span-2">Barrio</div>

<div class="col-span-4">Dirección</div>

<div class="col-span-3 text-right">Contacto</div>

</div>

<div id="lista-directorio"></div>

</div>

</main>



<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRuZasKNYxYbalNRDmAflSHMCmZSRXlLYdeOyeqBzl94liVBLXeIIOwZHQUmW5bsSP9bPL_9HhD9gUM/pub?output=csv";

let datos=[];


/* limpiar texto */

function clean(str){

return (str||"")

.toLowerCase()

.normalize("NFD")

.replace(/[\u0300-\u036f]/g,"")

.trim();

}


/* encontrar columna */

function findIndex(headers, posibles){

for(let i=0;i<headers.length;i++){

let h=clean(headers[i]);

for(let p of posibles){

if(h.includes(p)) return i;

}

}

return -1;

}


/* normalizar whatsapp */

function normalizarWhatsapp(num){

if(!num) return "";

let n=num.replace(/\D/g,'');

if(n.startsWith("54") && !n.startsWith("549"))

n="549"+n.substring(2);

if(n.startsWith("11"))

n="549"+n;

if(!n.startsWith("549"))

n="549"+n;

return n;

}


/* normalizar web */

function normalizarWeb(url){

if(!url) return "";

if(!url.startsWith("http"))

return "https://"+url;

return url;

}


async function init(){

const res=await fetch(CSV_URL);

const text=await res.text();

const rows=text.split(/\r?\n/).map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

const headers=rows[0];


const index={

nombre:findIndex(headers,["nombre"]),

direccion:findIndex(headers,["direccion"]),

barrio:findIndex(headers,["barrio"]),

telefono:findIndex(headers,["telefono"]),

email:findIndex(headers,["email"]),

website:findIndex(headers,["website","sitio","web"]),

whatsapp:findIndex(headers,["whatsapp","whats","wa"])

};


datos=rows.slice(1).map(r=>{

return{

nombre:r[index.nombre]?.replace(/"/g,"")||"",

direccion:r[index.direccion]?.replace(/"/g,"")||"",

barrio:r[index.barrio]?.replace(/"/g,"")||"",

telefono:r[index.telefono]?.replace(/"/g,"")||"",

email:r[index.email]?.replace(/"/g,"")||"",

website:r[index.website]?.replace(/"/g,"")||"",

whatsapp:r[index.whatsapp]?.replace(/"/g,"")||""

};

}).filter(x=>x.nombre);


renderizar(datos);

}



function renderizar(lista){

const container=document.getElementById("lista-directorio");

const counter=document.getElementById("counter");

container.innerHTML="";

counter.innerText=lista.length+" INMOBILIARIAS REGISTRADAS";


lista.forEach(inmo=>{

const wa=normalizarWhatsapp(inmo.whatsapp);

const web=normalizarWeb(inmo.website);

const map=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(inmo.nombre+" "+inmo.direccion+" "+inmo.barrio+" CABA")}`;


const row=`

<div class="directory-row grid grid-cols-1 md:grid-cols-12 gap-4 p-5 border-t border-slate-100">

<div class="md:col-span-3 font-bold text-slate-800">

${inmo.nombre}

<div class="md:hidden text-blue-600 text-xs font-bold uppercase">

${inmo.barrio}

</div>

</div>


<div class="hidden md:block md:col-span-2 text-sm text-slate-500">

${inmo.barrio}

</div>


<div class="md:col-span-4 text-sm text-slate-500">

<a href="${map}" target="_blank">

<i class="fa-solid fa-location-dot mr-2"></i>

${inmo.direccion}

</a>

</div>


<div class="md:col-span-3 flex gap-2 md:justify-end">

${wa?`

<a href="https://wa.me/${wa}" target="_blank"
class="bg-green-500 text-white w-10 h-10 flex items-center justify-center rounded-xl">

<i class="fa-brands fa-whatsapp"></i>

</a>

`:''}


${web?`

<a href="${web}" target="_blank"
class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase flex items-center gap-2">

<i class="fa-solid fa-globe"></i>

Web

</a>

`:''}

</div>

</div>

`;

container.innerHTML+=row;

});

}



document.getElementById("buscador").addEventListener("input",e=>{

const t=e.target.value.toLowerCase();

const filtrados=datos.filter(d=>

d.nombre.toLowerCase().includes(t) ||

d.barrio.toLowerCase().includes(t) ||

d.direccion.toLowerCase().includes(t)

);

renderizar(filtrados);

});


init();

</script>

</body>
</html>
